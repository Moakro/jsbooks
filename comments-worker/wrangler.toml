name = "jsbooks-comments"
main = "index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "jsbooks-comments"
database_id = "3ee537bc-5410-41d3-af72-d3051e847924"

# Routes attached to the jsbooks.wiki zone for everything under /api/auth/*
# and /api/comments*. Wildcards ensure they win over Pages routing even with
# query strings or anchors present.
[[routes]]
pattern = "jsbooks.wiki/api/auth/*"
zone_name = "jsbooks.wiki"

[[routes]]
pattern = "jsbooks.wiki/api/comments*"
zone_name = "jsbooks.wiki"

[[routes]]
pattern = "jsbooks.wiki/api/me*"
zone_name = "jsbooks.wiki"

[observability]
enabled = true

# Public, non-secret variables. Secrets (GOOGLE_CLIENT_SECRET, AUTH_SECRET) are
# attached via `wrangler secret put` separately.
[vars]
SITE_ORIGIN = "https://jsbooks.wiki"
