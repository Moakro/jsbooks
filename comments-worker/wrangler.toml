name = "jsbooks-comments"
main = "index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "jsbooks-db"
database_id = "607b2cf3-8754-4e87-9d1b-a68a35cc8052"

# R2 bucket for user-uploaded images (comment/post attachments).
# Public custom domain: img.jsbooks.wiki → see UPLOADS_PUBLIC_BASE in [vars].
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "jsbooks-uploads"

# Routes attached to the jsbooks.wiki zone. Wildcards ensure they win over
# Pages routing even with query strings or anchors present.
[[routes]]
pattern = "jsbooks.wiki/api/auth/*"
zone_name = "jsbooks.wiki"

[[routes]]
pattern = "jsbooks.wiki/api/comments*"
zone_name = "jsbooks.wiki"

[[routes]]
pattern = "jsbooks.wiki/api/me*"
zone_name = "jsbooks.wiki"

[[routes]]
pattern = "jsbooks.wiki/api/admin/*"
zone_name = "jsbooks.wiki"

[[routes]]
pattern = "jsbooks.wiki/api/upload/*"
zone_name = "jsbooks.wiki"

[observability]
enabled = true

# Public, non-secret variables. Secrets (GOOGLE_CLIENT_SECRET, AUTH_SECRET) are
# attached via `wrangler secret put` separately.
[vars]
SITE_ORIGIN = "https://jsbooks.wiki"
UPLOADS_PUBLIC_BASE = "https://img.jsbooks.wiki"

# ════════════════════════════════════════════════════════════════════
# Staging — stage.jsbooks.wiki
# 배포: `wrangler deploy --env staging`
# 사전 작업(1회): docs/STAGING.md 참고
#   - D1 staging DB 생성 + 마이그레이션 적용 → 아래 database_id 채움
#   - DNS: CF 대시보드에서 stage.jsbooks.wiki A/CNAME proxied
#   - Google OAuth: redirect_uri 에 https://stage.jsbooks.wiki/api/auth/callback/google 추가
#   - 시크릿: `wrangler secret put GOOGLE_CLIENT_ID --env staging` 등
# ════════════════════════════════════════════════════════════════════

[env.staging]
name = "jsbooks-comments-stage"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "jsbooks-db-stage"
database_id = "8ed315a1-06be-489b-bf06-6a8ce418d460"

# 사진 R2 는 프로덕션 공유 (이미지 단순 정적 자산이라 staging 따로 둘 이유 적음).
# 분리 필요 시 jsbooks-uploads-stage 버킷 별도 생성 후 변경.
[[env.staging.r2_buckets]]
binding = "UPLOADS"
bucket_name = "jsbooks-uploads"

[[env.staging.routes]]
pattern = "stage.jsbooks.wiki/api/auth/*"
zone_name = "jsbooks.wiki"

[[env.staging.routes]]
pattern = "stage.jsbooks.wiki/api/comments*"
zone_name = "jsbooks.wiki"

[[env.staging.routes]]
pattern = "stage.jsbooks.wiki/api/me*"
zone_name = "jsbooks.wiki"

[[env.staging.routes]]
pattern = "stage.jsbooks.wiki/api/admin/*"
zone_name = "jsbooks.wiki"

[[env.staging.routes]]
pattern = "stage.jsbooks.wiki/api/upload/*"
zone_name = "jsbooks.wiki"

[env.staging.vars]
SITE_ORIGIN = "https://stage.jsbooks.wiki"
UPLOADS_PUBLIC_BASE = "https://img.jsbooks.wiki"
